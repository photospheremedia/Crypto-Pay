# Netlify — legacy host during Vercel migration. Production deploy is manual only.
# Primary portal deploy: .github/workflows/vercel.yml + Vercel dashboard (see docs/VERCEL_MIGRATION.md).
# Disable Netlify "Build on push" in the UI to avoid double deploys.
name: Netlify CI/CD

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'apps/portal/**'
      - 'packages/**'
      - 'netlify.toml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/netlify.yml'
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'apps/portal/**'
      - 'packages/**'
      - 'netlify.toml'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/netlify.yml'
  workflow_dispatch:

concurrency:
  group: netlify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.5

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: corepack enable && pnpm install --frozen-lockfile

      - name: Typecheck portal
        run: pnpm --filter @crypto-pay/portal typecheck

  test:
    if: github.event_name == 'pull_request'
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.5

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: corepack enable && pnpm install --frozen-lockfile

      - name: Check portal CI test secrets
        id: portal_ci
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          can_test=true
          for name in NEXT_PUBLIC_SUPABASE_URL NEXT_PUBLIC_SUPABASE_ANON_KEY SUPABASE_SERVICE_ROLE_KEY; do
            if [ -z "${!name}" ]; then
              echo "Missing GitHub secret: $name"
              can_test=false
            fi
          done
          echo "can_test=${can_test}" >> "$GITHUB_OUTPUT"
          if [ "${can_test}" != "true" ]; then
            {
              echo "### Playwright tests skipped"
              echo ""
              echo "- Set \`NEXT_PUBLIC_SUPABASE_URL\`, \`NEXT_PUBLIC_SUPABASE_ANON_KEY\`, and \`SUPABASE_SERVICE_ROLE_KEY\` in repo Actions secrets."
              echo "- Bootstrap: \`pnpm portal:secrets\` (repo admin, from \`apps/portal/.env.local\`)."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Create portal env for Playwright
        if: steps.portal_ci.outputs.can_test == 'true'
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          cat > apps/portal/.env.local <<EOF
          NEXT_PUBLIC_SUPABASE_URL=${NEXT_PUBLIC_SUPABASE_URL}
          NEXT_PUBLIC_SUPABASE_ANON_KEY=${NEXT_PUBLIC_SUPABASE_ANON_KEY}
          SUPABASE_SERVICE_ROLE_KEY=${SUPABASE_SERVICE_ROLE_KEY}
          EOF

      - name: Install Playwright browsers
        if: steps.portal_ci.outputs.can_test == 'true'
        run: pnpm --filter @crypto-pay/portal exec playwright install --with-deps chromium

      - name: Run portal tests (Playwright)
        if: steps.portal_ci.outputs.can_test == 'true'
        run: pnpm --filter @crypto-pay/portal test

  preview:
    if: github.event_name == 'pull_request'
    needs: validate
    runs-on: ubuntu-latest
    environment: preview
    env:
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.5

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: corepack enable && pnpm install --frozen-lockfile

      - name: Typecheck portal
        run: pnpm --filter @crypto-pay/portal typecheck

      - name: Validate Netlify CI secrets
        id: validate_secrets
        run: |
          can_deploy=true

          if [ -z "${NETLIFY_AUTH_TOKEN}" ]; then
            echo "Missing NETLIFY_AUTH_TOKEN secret."
            can_deploy=false
          fi

          if [ -z "${NETLIFY_SITE_ID}" ]; then
            echo "Missing NETLIFY_SITE_ID secret."
            can_deploy=false
          fi

          echo "can_deploy=${can_deploy}" >> "$GITHUB_OUTPUT"

          if [ "${can_deploy}" != "true" ]; then
            {
              echo "### Netlify preview deploy skipped"
              echo ""
              echo "- CI did not deploy a Netlify preview because required secrets are missing."
              echo "- Run \`pnpm netlify:secrets\` (repo admin) after \`netlify link\`."
              echo "- Set \`NETLIFY_AUTH_TOKEN\` (personal access token) and \`NETLIFY_SITE_ID\` (Site API ID)."
              echo "- Keep build env vars in the Netlify UI (or \`pnpm netlify:env-sync\`)."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Build and deploy preview to Netlify
        if: steps.validate_secrets.outputs.can_deploy == 'true'
        run: |
          set -o pipefail
          pnpm exec netlify deploy --build --filter @crypto-pay/portal \
            --message "PR #${{ github.event.pull_request.number }} ${{ github.sha }}" \
            2>&1 | tee netlify-deploy.log
          exit "${PIPESTATUS[0]}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Netlify deploy failure hint
        if: failure() && steps.validate_secrets.outputs.can_deploy == 'true'
        run: |
          if grep -q "credit usage exceeded" netlify-deploy.log 2>/dev/null; then
            echo "::error::Netlify blocked the deploy — account credit usage exceeded. Add credits in Netlify billing, then re-run the workflow."
          fi

  deploy:
    # Paused for Vercel cutover — run manually from Actions if you need a Netlify build.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: production
    env:
      NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
      NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.5

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: corepack enable && pnpm install --frozen-lockfile

      - name: Typecheck portal
        run: pnpm --filter @crypto-pay/portal typecheck

      - name: Validate Netlify CI secrets
        id: validate_secrets
        run: |
          can_deploy=true

          if [ -z "${NETLIFY_AUTH_TOKEN}" ]; then
            echo "Missing NETLIFY_AUTH_TOKEN secret."
            can_deploy=false
          fi

          if [ -z "${NETLIFY_SITE_ID}" ]; then
            echo "Missing NETLIFY_SITE_ID secret."
            can_deploy=false
          fi

          echo "can_deploy=${can_deploy}" >> "$GITHUB_OUTPUT"

          if [ "${can_deploy}" != "true" ]; then
            {
              echo "### Netlify deploy skipped"
              echo ""
              echo "- CI did not deploy to Netlify because required secrets are missing."
              echo "- Run \`pnpm netlify:secrets\` (repo admin) after \`netlify link\`."
              echo "- Set \`NETLIFY_AUTH_TOKEN\` (personal access token) and \`NETLIFY_SITE_ID\` (Site API ID)."
              echo "- Keep build env vars in the Netlify UI (or \`pnpm netlify:env-sync\`)."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

      - name: Build and deploy production to Netlify
        if: steps.validate_secrets.outputs.can_deploy == 'true'
        run: |
          set -o pipefail
          pnpm exec netlify deploy --prod --build --filter @crypto-pay/portal \
            --message "Production ${{ github.sha }}" \
            2>&1 | tee netlify-deploy.log
          exit "${PIPESTATUS[0]}"
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Netlify deploy failure hint
        if: failure() && steps.validate_secrets.outputs.can_deploy == 'true'
        run: |
          if grep -q "credit usage exceeded" netlify-deploy.log 2>/dev/null; then
            echo "::error::Netlify blocked the deploy — account credit usage exceeded. Add credits in Netlify billing, then re-run the workflow."
          fi

      - name: Deployment summary
        if: steps.validate_secrets.outputs.can_deploy == 'true'
        run: |
          {
            echo "### Netlify production deploy"
            echo ""
            echo "- Branch: \`${{ github.ref_name }}\`"
            echo "- Commit: \`${{ github.sha }}\`"
            echo "- Build settings: \`netlify.toml\`"
          } >> "$GITHUB_STEP_SUMMARY"
