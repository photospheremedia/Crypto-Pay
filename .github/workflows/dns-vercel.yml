# Point Porkbun DNS at Vercel (apex A + www CNAME). Requires GitHub secrets from pnpm porkbun:secrets.
name: DNS — Porkbun → Vercel

on:
  workflow_dispatch:

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Apply Vercel DNS records via Porkbun API
        env:
          PORKBUN_API_KEY: ${{ secrets.PORKBUN_API_KEY }}
          PORKBUN_SECRET_API_KEY: ${{ secrets.PORKBUN_SECRET_API_KEY }}
          PORKBUN_DOMAIN: cryptopay.sale
        run: |
          if [ -z "$PORKBUN_API_KEY" ] || [ -z "$PORKBUN_SECRET_API_KEY" ]; then
            echo "Missing PORKBUN_API_KEY or PORKBUN_SECRET_API_KEY. Run: pnpm porkbun:secrets"
            exit 1
          fi
          printf '%s\n' \
            "PORKBUN_API_KEY=$PORKBUN_API_KEY" \
            "PORKBUN_SECRET_API_KEY=$PORKBUN_SECRET_API_KEY" \
            "PORKBUN_DOMAIN=cryptopay.sale" > .env.porkbun
          python3 scripts/porkbun-dns-vercel.py --clean --apply
