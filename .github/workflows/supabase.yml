name: Supabase CI/CD

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'supabase/**'
      - 'apps/portal/supabase/**'
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'supabase/**'
      - 'apps/portal/supabase/**'
  workflow_dispatch:

jobs:
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate Supabase CI secrets
        id: validate_secrets
        run: |
          can_run=true

          if [ -z "${SUPABASE_PROJECT_REF}" ]; then
            echo "Missing SUPABASE_PROJECT_REF secret."
            can_run=false
          fi

          if [ -z "${SUPABASE_ACCESS_TOKEN}" ]; then
            echo "Missing SUPABASE_ACCESS_TOKEN secret."
            can_run=false
          elif [[ ! "${SUPABASE_ACCESS_TOKEN}" =~ ^sbp_ ]]; then
            echo "Invalid SUPABASE_ACCESS_TOKEN format. Expected sbp_..."
            can_run=false
          fi

          echo "can_run=${can_run}" >> "$GITHUB_OUTPUT"

          if [ "${can_run}" != "true" ]; then
            {
              echo "### Supabase validate skipped"
              echo ""
              echo "- Run \`pnpm supabase:connect\` locally, then set GitHub secrets:"
              echo "  \`SUPABASE_ACCESS_TOKEN\` (sbp_... from Supabase dashboard)"
              echo "  \`SUPABASE_PROJECT_REF\` (e.g. usbxwewohpsbjwiuazpf)"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Link Supabase project
        if: steps.validate_secrets.outputs.can_run == 'true'
        run: supabase link --project-ref "${SUPABASE_PROJECT_REF}"

      - name: Lint migrations (linked)
        if: steps.validate_secrets.outputs.can_run == 'true'
        run: supabase db lint --linked --fail-on error

  deploy:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate Supabase CI secrets
        id: validate_secrets
        run: |
          can_deploy=true

          if [ -z "${SUPABASE_PROJECT_REF}" ]; then
            echo "Missing SUPABASE_PROJECT_REF secret."
            can_deploy=false
          fi

          if [ -z "${SUPABASE_ACCESS_TOKEN}" ]; then
            echo "Missing SUPABASE_ACCESS_TOKEN secret."
            can_deploy=false
          elif [[ ! "${SUPABASE_ACCESS_TOKEN}" =~ ^sbp_ ]]; then
            echo "Invalid SUPABASE_ACCESS_TOKEN format. Expected Supabase Personal Access Token like sbp_..."
            can_deploy=false
          fi

          echo "can_deploy=${can_deploy}" >> "$GITHUB_OUTPUT"

          if [ "${can_deploy}" != "true" ]; then
            {
              echo "### Supabase deploy skipped"
              echo ""
              echo "- Set \`SUPABASE_ACCESS_TOKEN\` to a Supabase Personal Access Token (\`sbp_...\`)."
              echo "- Set \`SUPABASE_PROJECT_REF\` to your project ref."
              echo "- Run locally: \`pnpm supabase:connect\`"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Link Supabase project
        if: steps.validate_secrets.outputs.can_deploy == 'true'
        run: supabase link --project-ref "${SUPABASE_PROJECT_REF}"

      - name: Migration status
        if: steps.validate_secrets.outputs.can_deploy == 'true'
        run: supabase migration list

      - name: Push database migrations
        if: steps.validate_secrets.outputs.can_deploy == 'true'
        run: supabase db push --include-all

      - name: Deploy Edge Functions
        if: steps.validate_secrets.outputs.can_deploy == 'true'
        run: |
          if [ -d "supabase/functions" ] && [ "$(ls -A supabase/functions 2>/dev/null | grep -v '^_' || true)" ]; then
            supabase functions deploy --project-ref "${SUPABASE_PROJECT_REF}"
          else
            echo "No edge functions to deploy"
          fi

      - name: Sync Resend Auth SMTP (optional)
        if: steps.validate_secrets.outputs.can_deploy == 'true'
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          if [ -z "${RESEND_API_KEY}" ]; then
            echo "RESEND_API_KEY GitHub secret not set — skipping Auth SMTP sync."
            echo "Run locally: pnpm resend:sync (uses apps/portal/.env.local)"
            exit 0
          fi
          # Resend SMTP for Supabase Auth — https://resend.com/docs/send-with-smtp
          python3 <<'PY'
          import json, os, urllib.request
          token = os.environ["SUPABASE_ACCESS_TOKEN"]
          ref = os.environ["SUPABASE_PROJECT_REF"]
          key = os.environ["RESEND_API_KEY"]
          payload = {
              "external_email_enabled": True,
              "site_url": "https://cryptopay.sale",
              "uri_allow_list": "https://cryptopay.sale/**,https://www.cryptopay.sale/**,http://localhost:3000/**,http://localhost:3001/**",
              "smtp_host": "smtp.resend.com",
              "smtp_port": "587",
              "smtp_user": "resend",
              "smtp_pass": key,
              "smtp_admin_email": "noreply@cryptopay.sale",
              "smtp_sender_name": "Crypto Pay",
              "mailer_autoconfirm": True,
              "rate_limit_email_sent": 30,
          }
          req = urllib.request.Request(
              f"https://api.supabase.com/v1/projects/{ref}/config/auth",
              data=json.dumps(payload).encode(),
              headers={"Authorization": f"Bearer {token}", "Content-Type": "application/json"},
              method="PATCH",
          )
          with urllib.request.urlopen(req) as resp:
              out = json.load(resp)
          print("Auth SMTP:", out.get("smtp_host"), out.get("smtp_admin_email"))
          PY
