name: Supabase CI/CD

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'supabase/**'
      - 'apps/portal/supabase/**'
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'supabase/**'
      - 'apps/portal/supabase/**'
  workflow_dispatch:

jobs:
  # Validate migrations on PRs (dry-run)
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate migrations
        run: |
          supabase db lint --linked
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  # Deploy migrations on push to main
  deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate Supabase CI secrets
        id: validate_secrets
        run: |
          can_deploy=true

          if [ -z "${SUPABASE_PROJECT_REF}" ]; then
            echo "Missing SUPABASE_PROJECT_REF secret."
            can_deploy=false
          fi

          if [ -z "${SUPABASE_ACCESS_TOKEN}" ]; then
            echo "Missing SUPABASE_ACCESS_TOKEN secret."
            can_deploy=false
          elif [[ ! "${SUPABASE_ACCESS_TOKEN}" =~ ^sbp_ ]]; then
            echo "Invalid SUPABASE_ACCESS_TOKEN format. Expected Supabase Personal Access Token like sbp_..."
            can_deploy=false
          fi

          echo "can_deploy=${can_deploy}" >> "$GITHUB_OUTPUT"

          if [ "${can_deploy}" != "true" ]; then
            {
              echo "### Supabase deploy skipped"
              echo ""
              echo "- CI did not run Supabase deploy because required secrets are missing/invalid."
              echo "- Set \`SUPABASE_ACCESS_TOKEN\` to a Supabase Personal Access Token (\`sbp_...\`) from the Supabase dashboard."
              echo "- Keep \`SUPABASE_PROJECT_REF\` set to your project ref."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Link Supabase project
        if: steps.validate_secrets.outputs.can_deploy == 'true'
        run: |
          supabase link --project-ref "${SUPABASE_PROJECT_REF}"

      - name: Sync migration history
        if: steps.validate_secrets.outputs.can_deploy == 'true'
        run: |
          # Check migration status
          echo "Checking migration status..."
          supabase migration list
          
          # Mark the professional schema migration as applied (it's already in remote DB)
          echo "Syncing migration history..."
          supabase migration repair --status applied 20260201000000 2>/dev/null || echo "Migration 20260201000000 already synced"
          
          # Verify all migrations are synced
          echo "Final migration status:"
          supabase migration list

      - name: Push database migrations
        if: steps.validate_secrets.outputs.can_deploy == 'true'
        run: |
          # Use --include-all to apply any missed migrations that were inserted before the last remote migration
          # This handles cases where migrations were manually pushed in a different order
          supabase db push --include-all

      - name: Deploy Edge Functions (if any)
        if: steps.validate_secrets.outputs.can_deploy == 'true'
        run: |
          if [ -d "supabase/functions" ] && [ "$(ls -A supabase/functions 2>/dev/null)" ]; then
            supabase functions deploy --project-ref "${SUPABASE_PROJECT_REF}"
          else
            echo "No edge functions to deploy"
          fi
