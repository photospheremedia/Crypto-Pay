name: Supabase CI/CD

# Deployment behavior:
# - Runs automatically on git push to main/master for supabase/** changes.
# - Treat this as the default deploy path (avoid manual `supabase db push` unless explicitly needed).

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'supabase/**'
      - 'apps/portal/supabase/**'
  pull_request:
    branches:
      - main
      - master
    paths:
      - 'supabase/**'
      - 'apps/portal/supabase/**'
  workflow_dispatch:

jobs:
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate Supabase CI secrets
        id: validate_secrets
        run: |
          can_run=true

          if [ -z "${SUPABASE_PROJECT_REF}" ]; then
            echo "Missing SUPABASE_PROJECT_REF secret."
            can_run=false
          fi

          if [ -z "${SUPABASE_ACCESS_TOKEN}" ]; then
            echo "Missing SUPABASE_ACCESS_TOKEN secret."
            can_run=false
          elif [[ ! "${SUPABASE_ACCESS_TOKEN}" =~ ^sbp_ ]]; then
            echo "Invalid SUPABASE_ACCESS_TOKEN format. Expected sbp_..."
            can_run=false
          fi

          echo "can_run=${can_run}" >> "$GITHUB_OUTPUT"

          if [ "${can_run}" != "true" ]; then
            {
              echo "### Supabase validate skipped"
              echo ""
              echo "- Run \`pnpm supabase:connect\` locally, then set GitHub secrets:"
              echo "  \`SUPABASE_ACCESS_TOKEN\` (sbp_... from Supabase dashboard)"
              echo "  \`SUPABASE_PROJECT_REF\` (e.g. usbxwewohpsbjwiuazpf)"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Link Supabase project
        if: steps.validate_secrets.outputs.can_run == 'true'
        run: supabase link --project-ref "${SUPABASE_PROJECT_REF}"

      - name: Lint migrations (linked)
        if: steps.validate_secrets.outputs.can_run == 'true'
        run: supabase db lint --linked --fail-on error

  deploy:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate Supabase CI secrets
        id: validate_secrets
        run: |
          can_deploy=true

          if [ -z "${SUPABASE_PROJECT_REF}" ]; then
            echo "Missing SUPABASE_PROJECT_REF secret."
            can_deploy=false
          fi

          if [ -z "${SUPABASE_ACCESS_TOKEN}" ]; then
            echo "Missing SUPABASE_ACCESS_TOKEN secret."
            can_deploy=false
          elif [[ ! "${SUPABASE_ACCESS_TOKEN}" =~ ^sbp_ ]]; then
            echo "Invalid SUPABASE_ACCESS_TOKEN format. Expected Supabase Personal Access Token like sbp_..."
            can_deploy=false
          fi

          echo "can_deploy=${can_deploy}" >> "$GITHUB_OUTPUT"

          if [ "${can_deploy}" != "true" ]; then
            {
              echo "### Supabase deploy skipped"
              echo ""
              echo "- Set \`SUPABASE_ACCESS_TOKEN\` to a Supabase Personal Access Token (\`sbp_...\`)."
              echo "- Set \`SUPABASE_PROJECT_REF\` to your project ref."
              echo "- Run locally: \`pnpm supabase:connect\`"
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Link Supabase project
        if: steps.validate_secrets.outputs.can_deploy == 'true'
        run: supabase link --project-ref "${SUPABASE_PROJECT_REF}"

      - name: Migration status
        if: steps.validate_secrets.outputs.can_deploy == 'true'
        run: supabase migration list

      - name: Push database migrations
        if: steps.validate_secrets.outputs.can_deploy == 'true'
        run: supabase db push --include-all

      - name: Deploy Edge Functions
        if: steps.validate_secrets.outputs.can_deploy == 'true'
        run: |
          if [ -d "supabase/functions" ] && [ "$(ls -A supabase/functions 2>/dev/null | grep -v '^_' || true)" ]; then
            supabase functions deploy --project-ref "${SUPABASE_PROJECT_REF}"
          else
            echo "No edge functions to deploy"
          fi

      - name: Push Supabase config (config.toml -> remote)
        if: steps.validate_secrets.outputs.can_deploy == 'true'
        env:
          # config.toml interpolates the SMTP password via pass = "env(RESEND_API_KEY)".
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          if [ -z "${RESEND_API_KEY}" ]; then
            # config.toml enables Auth SMTP with pass = env(RESEND_API_KEY); pushing without it
            # would send an empty SMTP password to production. Skip until the secret is set.
            echo "RESEND_API_KEY GitHub secret not set — skipping config push to avoid clearing Auth SMTP."
            echo "Run locally instead: pnpm resend:sync (uses apps/portal/.env.local), or set the GitHub secret."
            {
              echo "### Supabase config push skipped"
              echo ""
              echo "- Set the \`RESEND_API_KEY\` GitHub secret so \`config.toml\` SMTP can be pushed."
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          # Single source of truth: config.toml -> remote auth config (site_url, redirect URLs,
          # email confirmations, rate limits, Resend SMTP, custom_access_token hook, email templates).
          supabase config push --project-ref "${SUPABASE_PROJECT_REF}" --yes

      - name: Apply project security settings (Management API)
        if: steps.validate_secrets.outputs.can_deploy == 'true'
        run: |
          # Leaked-password protection (HaveIBeenPwned) is a project-level Auth setting that is
          # NOT represented in config.toml, so `config push` cannot carry it. Patch it directly.
          # Requires the Pro plan; on lower plans the API rejects it, so this step is non-fatal.
          http=$(curl -sS -o /tmp/hibp.json -w '%{http_code}' \
            -X PATCH "https://api.supabase.com/v1/projects/${SUPABASE_PROJECT_REF}/config/auth" \
            -H "Authorization: Bearer ${SUPABASE_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"password_hibp_enabled": true}')
          if [ "${http}" = "200" ]; then
            echo "Leaked-password protection enabled (password_hibp_enabled=true)."
          else
            echo "::warning::Could not enable leaked-password protection (HTTP ${http}). Requires Pro plan."
            cat /tmp/hibp.json || true
          fi
